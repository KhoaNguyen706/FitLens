spring.application.name=FitLens

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

fitlens.jwt.secret=${JWT_SECRET:fitlens-dev-secret-change-me-before-production-use}
fitlens.jwt.expiration-ms=3600000
fitlens.jwt.refresh-expiration-ms=5184000000

fitlens.admin.enabled=true
fitlens.admin.email=${FITLENS_ADMIN_EMAIL:admin@fitlens.local}
fitlens.admin.password=${FITLENS_ADMIN_PASSWORD:admin123456}
fitlens.admin.display-name=${FITLENS_ADMIN_DISPLAY_NAME:Admin}

fitlens.oauth.google.client-ids=${GOOGLE_OAUTH_CLIENT_IDS:}
fitlens.oauth.apple.client-id=${APPLE_OAUTH_CLIENT_ID:host.exp.Exponent}

fitlens.uploads.dir=${FITLENS_UPLOADS_DIR:./uploads}

# Keep AI service credentials on the backend only.
fitlens.ai.enabled=${FITLENS_AI_ENABLED:true}
fitlens.ai.url=${FITLENS_AI_SERVICE_URL:http://localhost:8000}
fitlens.ai.timeout-seconds=${FITLENS_AI_TIMEOUT_SECONDS:35}
