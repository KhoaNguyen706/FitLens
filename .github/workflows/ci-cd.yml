name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-build-test:
    name: Build Java Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Backend Package
        run: |
          set +e
          ./mvnw -Dmaven.test.skip=true package > maven-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "### Maven backend build failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 maven-build.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -n 30 maven-build.log | while IFS= read -r line; do
              escaped="${line//'%'/'%25'}"
              escaped="${escaped//$'\n'/'%0A'}"
              escaped="${escaped//$'\r'/'%0D'}"
              echo "::error ::$escaped"
            done
          fi
          exit "$status"

  mobile-frontend-build:
    name: Build Expo Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Dependencies
        run: |
          cd mobile
          npm ci

      - name: Build Mobile Web App
        run: |
          cd mobile
          npm run build

  ai-service-check:
    name: Validate Python AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install Dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt

      - name: Check Python Syntax
        run: |
          cd ai-service
          python -m py_compile main.py

  deploy-heroku:
    name: Deploy Backend to Heroku
    needs: backend-build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}
          HEROKU_APP_NAME: fit-lens
        run: |
          if [ -z "$HEROKU_API_KEY" ] || [ -z "$HEROKU_EMAIL" ]; then
            echo "::error ::Missing HEROKU_API_KEY or HEROKU_EMAIL repository secret."
            exit 1
          fi

          cat > ~/.netrc <<EOF
          machine api.heroku.com
            login $HEROKU_EMAIL
            password $HEROKU_API_KEY
          machine git.heroku.com
            login $HEROKU_EMAIL
            password $HEROKU_API_KEY
          EOF
          chmod 600 ~/.netrc

          heroku auth:whoami
          git remote add heroku "https://git.heroku.com/$HEROKU_APP_NAME.git"
          git push heroku HEAD:main --force
